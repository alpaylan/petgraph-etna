# ETNA workload index for petgraph.
#
# One [[variant]] per injected mutation. Source of truth for variant -> property
# mapping. Every other fact is derivable from the source tree:
#   - ls patches/*.patch                                       (patch-based variants)
#   - grep -rn "pub fn property_" crates/petgraph/src/etna.rs  (property functions)
#   - grep -rn "fn witness_.*_case_" crates/petgraph/tests/    (witness tests)
#
# Base commit for this workload is HEAD of master on this tree. Every
# etna/<variant> branch is master + exactly one patch applied on top.

name = "petgraph"
language = "Rust"

[[variant]]
name = "iterative_dfs_order_0fae246_1"
property = "dfs_reuse_no_duplicate_visits"
injection = "patch"
patch = "patches/iterative_dfs_order_0fae246_1.patch"
source_commit = "0fae246b07f3dba059a40288c4a7a96588bef19b"
witnesses = [
    "witness_dfs_reuse_no_duplicate_visits_case_line",
    "witness_dfs_reuse_no_duplicate_visits_case_branch",
]
frameworks = ["proptest", "quickcheck", "crabcheck", "hegel"]
files = ["crates/petgraph/src/visit/traversal.rs"]

